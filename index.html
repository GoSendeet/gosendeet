<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="/favicon-white.png" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Viewport & theme -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16a34a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#052e16" media="(prefers-color-scheme: dark)" />

    <!-- SEO -->
    <title>GoSendeet – Nigeria's Most Trusted Logistics Network</title>
    <meta name="description" content="GoSendeet – Nigeria's most trusted logistics network. Send packages reliably or grow your business as a franchise partner." />
    <meta name="keywords" content="logistics, delivery, Nigeria, franchise, GoSendeet, courier" />
    <meta name="author" content="GoSendeet" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn previews) -->
    <meta property="og:title" content="GoSendeet – Nigeria's Most Trusted Logistics Network" />
    <meta property="og:description" content="Reliable deliveries across Nigeria. Join as a customer or grow your business as a franchise partner." />
    <meta property="og:image" content="/hero-section.png" />
    <meta property="og:url" content="https://gosendeet.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GoSendeet" />

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GoSendeet – Nigeria's Most Trusted Logistics Network" />
    <meta name="twitter:description" content="Reliable deliveries across Nigeria. Join as a customer or franchise partner." />
    <meta name="twitter:image" content="/hero-section.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Performance: pre-resolve Chatwoot DNS early -->
    <link rel="dns-prefetch" href="https://backoffice-customer-support.gosendeet.com" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
